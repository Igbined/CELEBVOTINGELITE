<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Payment Proof - EliteVote</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/lucide"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap');
        body { font-family: 'Outfit', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-black dark:text-white transition-colors duration-300">

    <!-- Header -->
    <header class="bg-white/80 dark:bg-black/90 backdrop-blur-md sticky top-0 z-50 border-b border-slate-200 dark:border-white/10">
        <nav class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-slate-900 dark:text-white flex items-center gap-2 tracking-tight">
                <span class="bg-blue-600 p-1.5 rounded-lg text-white"><i data-lucide="award"></i></span> EliteVote
            </h1>
            
            <button id="theme-toggle" class="w-10 h-10 flex items-center justify-center rounded-2xl bg-slate-100 hover:bg-slate-200 dark:bg-white/10 dark:hover:bg-white/20 transition-all">
                <i id="theme-icon" data-lucide="moon" class="w-5 h-5"></i>
            </button>
        </nav>
    </header>

    <div class="max-w-2xl mx-auto px-6 py-12">
        <div class="bg-white dark:bg-black rounded-3xl shadow-sm border border-slate-200 dark:border-white/10 p-8 md:p-10">
            
            <button onclick="window.history.back()" 
                    class="flex items-center gap-2 text-slate-500 dark:text-zinc-400 hover:text-slate-700 dark:hover:text-white mb-8 transition">
                <i data-lucide="arrow-left" class="w-5 h-5"></i>
                <span class="font-medium">Back</span>
            </button>

            <h2 class="text-4xl font-bold text-center mb-2">Submit Payment Proof</h2>
            <p class="text-center text-slate-500 dark:text-zinc-400 mb-10">Send your transaction proof via Live Chat Support</p>

            <!-- Order Info -->
            <div class="bg-slate-50 dark:bg-zinc-950 rounded-2xl p-6 mb-10">
                <div class="flex justify-between items-center">
                    <span class="text-slate-500 dark:text-zinc-400">Celebrity</span>
                    <span id="celeb-name" class="font-semibold">Michael Lynx</span>
                </div>
                <div class="flex justify-between items-center mt-3">
                    <span class="text-slate-500 dark:text-zinc-400">Total Amount</span>
                    <span id="total-amount" class="font-bold text-blue-600">$2,500</span>
                </div>
            </div>

            <div class="space-y-10">
                <!-- Transaction Hash -->
                <div>
                    <label class="text-xs font-bold uppercase tracking-widest text-slate-400 mb-3 block">Transaction Hash (TXID)</label>
                    <input id="tx-hash" 
                           type="text" 
                           placeholder="Enter your Bitcoin Transaction Hash"
                           class="w-full bg-slate-50 dark:bg-zinc-950 border border-slate-200 dark:border-white/10 rounded-2xl p-5 font-mono focus:ring-2 focus:ring-blue-500 outline-none">
                </div>

                <!-- Photo Upload -->
                <div>
                    <label class="text-xs font-bold uppercase tracking-widest text-slate-400 mb-3 block">Photo of Transaction / Receipt</label>
                    <div class="border-2 border-dashed border-slate-300 dark:border-white/20 rounded-3xl p-8 text-center hover:border-blue-400 transition">
                        <input type="file" id="proof-upload" accept="image/*" class="hidden">
                        <label for="proof-upload" class="cursor-pointer flex flex-col items-center">
                            <i data-lucide="upload" class="w-12 h-12 text-slate-400 dark:text-zinc-500 mb-4"></i>
                            <p class="font-medium">Click to upload screenshot</p>
                            <p class="text-sm text-slate-500 dark:text-zinc-400 mt-1">PNG, JPG or JPEG (max 5MB)</p>
                        </label>
                    </div>
                    <div id="preview" class="hidden mt-6">
                        <img id="image-preview" class="max-h-80 mx-auto rounded-2xl shadow-sm">
                    </div>
                </div>
            </div>

            <!-- Submit Button -->
            <button onclick="submitProof()" 
                    id="submit-proof-button"
                    class="mt-12 w-full py-6 bg-blue-600 hover:bg-blue-700 text-white rounded-2xl font-semibold text-lg transition flex items-center justify-center gap-3 disabled:cursor-not-allowed disabled:opacity-70">
                <span id="send-button-text" class="flex items-center gap-3">
                    <i data-lucide="send" class="w-6 h-6"></i>
                    Send Proof to Live Chat
                </span>
                <svg id="send-spinner" class="hidden w-5 h-5 animate-spin text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                    <circle cx="12" cy="12" r="10" stroke-opacity="0.25"></circle>
                    <path d="M22 12a10 10 0 0 1-10 10" stroke-linecap="round"></path>
                </svg>
            </button>

            <p id="proof-status" class="text-center text-xs mt-4 text-slate-500 dark:text-zinc-400"></p>
            <p class="text-center text-xs text-slate-400 dark:text-zinc-500 mt-8">
                Our support team will verify your payment within minutes
            </p>
        </div>
    </div>

    <!-- Success Message -->
    <div id="success-screen" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50 px-4">
        <div class="bg-white dark:bg-black rounded-3xl p-10 max-w-md text-center">
            <div class="w-20 h-20 mx-auto bg-green-100 dark:bg-green-900/30 text-green-600 rounded-2xl flex items-center justify-center mb-6">
                <i data-lucide="check-circle" class="w-12 h-12"></i>
            </div>
            <h3 class="text-3xl font-bold mb-3">Proof Sent Successfully</h3>
            <p class="text-slate-500 dark:text-zinc-400">Your payment proof has been received.<br>Our team is verifying it now.</p>
            <button onclick="goHome()" 
                    class="mt-10 w-full py-5 bg-blue-600 text-white rounded-2xl font-semibold hover:bg-blue-700">
                Return to Homepage
            </button>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/confirmpayment.js"></script>
</body>
</html>
